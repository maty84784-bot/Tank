<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เกมรถถัง มือถือ</title>
    <style>
        * {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        .game-container {
            background: #16213e;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            max-width: 100vw;
            max-height: 100vh;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #2d5a2d;
            border-radius: 10px;
            width: 100%;
            height: auto;
            touch-action: none;
            cursor: crosshair;
        }
        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #eee;
            padding: 10px 8px 5px 8px;
            font-size: 16px;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 5px;
        }
        .info-left {
            display: flex;
            gap: 20px;
        }
        .controls {
            color: #aaa;
            font-size: 12px;
            text-align: center;
            padding: 8px;
            border-top: 1px solid #2a3a5a;
            margin-top: 5px;
        }
        .controls span {
            background: #2a3a5a;
            padding: 4px 10px;
            border-radius: 20px;
            margin: 0 3px;
            display: inline-block;
        }
        button {
            background: #e67e22;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
        }
        button:active {
            transform: scale(0.95);
        }
        .touch-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 10px;
        }
        .joystick-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .joystick-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            color: white;
            touch-action: none;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .joystick-btn:active {
            background: rgba(255,255,255,0.25);
            transform: scale(0.95);
        }
        .fire-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #e74c3c, #c0392b);
            border: 4px solid #ff6b6b;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            color: white;
            font-weight: bold;
            touch-action: none;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.4);
        }
        .fire-btn:active {
            transform: scale(0.92);
            box-shadow: 0 0 50px rgba(231, 76, 60, 0.7);
        }
        @media (max-width: 600px) {
            .info {
                font-size: 13px;
                padding: 5px;
            }
            .joystick-btn {
                width: 60px;
                height: 60px;
                font-size: 22px;
            }
            .fire-btn {
                width: 70px;
                height: 70px;
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="700" height="500"></canvas>
    
    <div class="info">
        <div class="info-left">
            <div>🎯 <span id="scoreDisplay">0</span></div>
            <div>❤️ <span id="livesDisplay">3</span></div>
        </div>
        <button id="restartBtn">🔄 เริ่มใหม่</button>
    </div>
    
    <!-- ปุ่มควบคุมแบบ Touch -->
    <div class="touch-controls">
        <div class="joystick-area">
            <div class="joystick-btn" id="upBtn">⬆</div>
            <div class="joystick-btn" id="leftBtn" style="margin:0 5px;">⬅</div>
            <div class="joystick-btn" id="downBtn">⬇</div>
            <div class="joystick-btn" id="rightBtn" style="margin:0 5px;">➡</div>
        </div>
        <div class="fire-btn" id="fireBtn">🔥</div>
    </div>
    
    <div class="controls">
        <span>⬆⬇⬅➡</span> เคลื่อนที่ &nbsp;|&nbsp; <span>🔥</span> ยิง
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const livesSpan = document.getElementById('livesDisplay');

        // ขนาด
        const TANK_SIZE = 32;
        const BULLET_RADIUS = 6;
        const ENEMY_SIZE = 30;
        const PLAYER_SPEED = 3.5;
        const BULLET_SPEED = 6;
        const ENEMY_SPEED = 1.2;
        const SHOT_COOLDOWN = 12;

        // สถานะเกม
        let player = { x: 350, y: 430, w: TANK_SIZE, h: TANK_SIZE, alive: true };
        let enemies = [];
        let bullets = [];
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let shotTimer = 0;

        // ควบคุม
        let touchKeys = { up: false, down: false, left: false, right: false };
        let mouseX = player.x + player.w/2;
        let mouseY = player.y + player.h/2;

        // สำหรับยิงอัตโนมัติ (กดค้าง)
        let isFiring = false;
        let fireInterval = null;

        // ---------- ฟังก์ชัน ----------
        function updateUI() {
            scoreSpan.textContent = score;
            livesSpan.textContent = lives;
        }

        function setGameOver() {
            gameOver = true;
            player.alive = false;
            if (fireInterval) {
                clearInterval(fireInterval);
                fireInterval = null;
            }
        }

        function spawnEnemy() {
            const padding = 20;
            let x, y, valid;
            let attempts = 0;
            do {
                x = padding + Math.random() * (canvas.width - ENEMY_SIZE - padding * 2);
                y = padding + Math.random() * (canvas.height * 0.4);
                valid = true;
                for (let e of enemies) {
                    if (Math.hypot(e.x - x, e.y - y) < ENEMY_SIZE + 10) {
                        valid = false;
                        break;
                    }
                }
                if (valid) {
                    if (Math.hypot(player.x - x, player.y - y) < 120) valid = false;
                }
                attempts++;
                if (attempts > 200) break;
            } while (!valid);
            enemies.push({
                x, y,
                w: ENEMY_SIZE, h: ENEMY_SIZE,
                dx: (Math.random() - 0.5) * 1.2,
                dy: (Math.random() - 0.5) * 1.2,
                lastShot: 0
            });
        }

        function resetGame() {
            player = { x: 350, y: 430, w: TANK_SIZE, h: TANK_SIZE, alive: true };
            enemies = [];
            bullets = [];
            score = 0;
            lives = 3;
            gameOver = false;
            shotTimer = 0;
            touchKeys = { up: false, down: false, left: false, right: false };
            isFiring = false;
            if (fireInterval) {
                clearInterval(fireInterval);
                fireInterval = null;
            }
            mouseX = player.x + player.w/2;
            mouseY = player.y + player.h/2;
            updateUI();
            for (let i = 0; i < 4; i++) spawnEnemy();
        }

        // ---------- การยิง ----------
        function shootBullet(targetX, targetY) {
            if (gameOver || !player.alive) return;
            if (shotTimer > 0) return;
            const centerX = player.x + player.w/2;
            const centerY = player.y + player.h/2;
            const angle = Math.atan2(targetY - centerY, targetX - centerX);
            bullets.push({
                x: centerX - BULLET_RADIUS,
                y: centerY - BULLET_RADIUS,
                vx: Math.cos(angle) * BULLET_SPEED,
                vy: Math.sin(angle) * BULLET_SPEED,
                isEnemy: false
            });
            shotTimer = SHOT_COOLDOWN;
        }

        // ยิงตามตำแหน่งเมาส์
        function fireAtMouse() {
            shootBullet(mouseX, mouseY);
        }

        // เริ่ม/หยุดยิงอัตโนมัติ
        function startFiring() {
            if (isFiring || gameOver || !player.alive) return;
            isFiring = true;
            fireAtMouse(); // ยิงทันที
            fireInterval = setInterval(fireAtMouse, 150); // ยิงทุก 150ms
        }

        function stopFiring() {
            isFiring = false;
            if (fireInterval) {
                clearInterval(fireInterval);
                fireInterval = null;
            }
        }

        // ---------- อัปเดต ----------
        function update() {
            if (gameOver || !player.alive) {
                if (fireInterval) {
                    clearInterval(fireInterval);
                    fireInterval = null;
                }
                return;
            }

            // เคลื่อนที่
            let dx = 0, dy = 0;
            if (touchKeys.up) dy -= PLAYER_SPEED;
            if (touchKeys.down) dy += PLAYER_SPEED;
            if (touchKeys.left) dx -= PLAYER_SPEED;
            if (touchKeys.right) dx += PLAYER_SPEED;
            if (dx !== 0 && dy !== 0) {
                dx *= 0.707;
                dy *= 0.707;
            }
            let newX = player.x + dx;
            let newY = player.y + dy;
            newX = Math.max(0, Math.min(canvas.width - player.w, newX));
            newY = Math.max(0, Math.min(canvas.height - player.h, newY));
            player.x = newX;
            player.y = newY;

            if (shotTimer > 0) shotTimer--;

            // อัปเดตกระสุน
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                if (b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) {
                    bullets.splice(i, 1);
                    continue;
                }
                if (b.isEnemy) {
                    if (player.alive &&
                        b.x > player.x && b.x < player.x + player.w &&
                        b.y > player.y && b.y < player.y + player.h) {
                        player.alive = false;
                        lives--;
                        updateUI();
                        bullets.splice(i, 1);
                        if (lives <= 0) {
                            setGameOver();
                        } else {
                            player.x = 350;
                            player.y = 430;
                            player.alive = true;
                            bullets = [];
                            if (enemies.length > 5) {
                                enemies.splice(0, enemies.length - 5);
                            }
                        }
                        continue;
                    }
                } else {
                    let hit = false;
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        if (b.x > e.x && b.x < e.x + e.w &&
                            b.y > e.y && b.y < e.y + e.h) {
                            enemies.splice(j, 1);
                            score += 10;
                            updateUI();
                            hit = true;
                            if (enemies.length < 15) {
                                spawnEnemy();
                                if (Math.random() < 0.4) spawnEnemy();
                            }
                            break;
                        }
                    }
                    if (hit) bullets.splice(i, 1);
                }
            }

            // AI ศัตรู
            for (let e of enemies) {
                e.x += e.dx;
                e.y += e.dy;
                if (e.x < 0 || e.x + e.w > canvas.width) e.dx *= -1;
                if (e.y < 0 || e.y + e.h > canvas.height * 0.7) e.dy *= -1;
                if (e.y + e.h > canvas.height * 0.75) e.dy *= -1;
                if (e.y < 5) e.dy = Math.abs(e.dy);

                if (player.alive && Math.random() < 0.015) {
                    const angle = Math.atan2(
                        (player.y + player.h/2) - (e.y + e.h/2),
                        (player.x + player.w/2) - (e.x + e.w/2)
                    );
                    bullets.push({
                        x: e.x + e.w/2 - BULLET_RADIUS,
                        y: e.y + e.h/2 - BULLET_RADIUS,
                        vx: Math.cos(angle) * (BULLET_SPEED * 0.8),
                        vy: Math.sin(angle) * (BULLET_SPEED * 0.8),
                        isEnemy: true
                    });
                }
            }

            if (enemies.length < 3 && !gameOver) {
                spawnEnemy();
                if (Math.random() < 0.5) spawnEnemy();
            }
        }

        // ---------- วาด ----------
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // พื้น
            ctx.strokeStyle = '#3d6b3d';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // กระสุน
            for (let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x + BULLET_RADIUS, b.y + BULLET_RADIUS, BULLET_RADIUS, 0, Math.PI*2);
                ctx.fillStyle = b.isEnemy ? '#ff4444' : '#ffdd44';
                ctx.shadowColor = b.isEnemy ? '#ff0000' : '#ffaa00';
                ctx.shadowBlur = 12;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // ศัตรู
            for (let e of enemies) {
                ctx.fillStyle = '#8b3a3a';
                ctx.shadowColor = '#550000';
                ctx.shadowBlur = 8;
                ctx.fillRect(e.x, e.y, e.w, e.h);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#b55a3a';
                ctx.beginPath();
                ctx.arc(e.x + e.w/2, e.y + e.h/2, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#3a2a1a';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(e.x + e.w/2, e.y + e.h/2);
                const ang = Math.atan2(
                    (player.y + player.h/2) - (e.y + e.h/2),
                    (player.x + player.w/2) - (e.x + e.w/2)
                );
                ctx.lineTo(e.x + e.w/2 + Math.cos(ang)*20, e.y + e.h/2 + Math.sin(ang)*20);
                ctx.stroke();
                ctx.fillStyle = '#5a3a2a';
                ctx.fillRect(e.x+5, e.y-4, 8, 4);
                ctx.fillRect(e.x+e.w-13, e.y-4, 8, 4);
            }

            // ผู้เล่น
            if (player.alive) {
                ctx.fillStyle = '#3a7a3a';
                ctx.shadowColor = '#2a5a2a';
                ctx.shadowBlur = 12;
                ctx.fillRect(player.x, player.y, player.w, player.h);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#5a9a4a';
                ctx.beginPath();
                ctx.arc(player.x + player.w/2, player.y + player.h/2, 12, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#2a3a1a';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(player.x + player.w/2, player.y + player.h/2);
                const ang = Math.atan2(mouseY - (player.y + player.h/2), mouseX - (player.x + player.w/2));
                ctx.lineTo(player.x + player.w/2 + Math.cos(ang)*24, player.y + player.h/2 + Math.sin(ang)*24);
                ctx.stroke();
                ctx.fillStyle = '#2a5a2a';
                ctx.fillRect(player.x+6, player.y-5, 10, 5);
                ctx.fillRect(player.x+player.w-16, player.y-5, 10, 5);
            } else {
                ctx.fillStyle = '#888';
                ctx.font = 'bold 32px sans-serif';
                ctx.fillText('💥', player.x+4, player.y+30);
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, canvas.height/2-50, canvas.width, 100);
                ctx.fillStyle = '#f1c40f';
                ctx.font = 'bold 44px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('💀 GAME OVER', canvas.width/2, canvas.height/2+16);
                ctx.textAlign = 'left';
            }
        }

        // ---------- เกมลูป ----------
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ---------- Event Listeners (Touch + Mouse) ----------
        
        // --- ปุ่มควบคุมแบบ Touch ---
        function setupTouchButton(id, key) {
            const btn = document.getElementById(id);
            if (!btn) return;
            
            const startTouch = (e) => {
                e.preventDefault();
                if (gameOver || !player.alive) return;
                touchKeys[key] = true;
            };
            
            const endTouch = (e) => {
                e.preventDefault();
                touchKeys[key] = false;
            };
            
            btn.addEventListener('touchstart', startTouch, { passive: false });
            btn.addEventListener('touchend', endTouch, { passive: false });
            btn.addEventListener('touchcancel', endTouch, { passive: false });
            
            // รองรับเมาส์ด้วย (สำหรับทดสอบ)
            btn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                if (gameOver || !player.alive) return;
                touchKeys[key] = true;
            });
            btn.addEventListener('mouseup', (e) => {
                e.preventDefault();
                touchKeys[key] = false;
            });
            btn.addEventListener('mouseleave', (e) => {
                touchKeys[key] = false;
            });
        }

        setupTouchButton('upBtn', 'up');
        setupTouchButton('downBtn', 'down');
        setupTouchButton('leftBtn', 'left');
        setupTouchButton('rightBtn', 'right');

        // --- ปุ่มยิง ---
        const fireBtn = document.getElementById('fireBtn');
        if (fireBtn) {
            fireBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startFiring();
            }, { passive: false });
            fireBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                stopFiring();
            }, { passive: false });
            fireBtn.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                stopFiring();
            }, { passive: false });
            
            fireBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                startFiring();
            });
            fireBtn.addEventListener('mouseup', (e) => {
                e.preventDefault();
                stopFiring();
            });
            fireBtn.addEventListener('mouseleave', (e) => {
                stopFiring();
            });
        }

        // --- เมาส์เลื่อนเพื่อเล็ง ---
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = Math.max(0, Math.min(canvas.width, (e.clientX - rect.left) * scaleX));
            mouseY = Math.max(0, Math.min(canvas.height, (e.clientY - rect.top) * scaleY));
        });

        // --- คลิกบน canvas เพื่อยิง (สำหรับ PC) ---
        canvas.addEventListener('click', (e) => {
            if (gameOver || !player.alive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;
            shootBullet(clickX, clickY);
        });

        // --- ปุ่มรีสตาร์ท ---
        document.getElementById('restartBtn').addEventListener('click', () => {
            stopFiring();
            resetGame();
        });

        // --- ป้องกันการเลื่อนหน้า ---
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // ---------- เริ่มเกม ----------
        resetGame();
        gameLoop();
    })();
</script>
</body>
  </html>
