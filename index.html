<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TANK WARFARE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --olive: #3d4a1e;
    --tan: #c8a86b;
    --steel: #2a3240;
    --rust: #8b2e00;
    --neon-green: #39ff14;
    --neon-red: #ff2020;
    --hud-bg: rgba(0,0,0,0.75);
    --panel-border: #5a6e2a;
  }

  body {
    background: #111;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
  }

  /* ===== SCREENS ===== */
  #screen-select, #screen-game, #screen-over {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .hidden { display: none !important; }

  /* ===== SELECT SCREEN ===== */
  #screen-select {
    background: radial-gradient(ellipse at 50% 30%, #1a2a0a 0%, #0a0f04 100%);
  }
  .game-title {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--tan);
    text-shadow: 0 0 20px #c8a86b88, 0 2px 0 #3d2b00;
    margin-bottom: 0.2em;
  }
  .game-subtitle {
    font-family: 'Share Tech Mono', monospace;
    color: #7a9a3a;
    letter-spacing: 0.3em;
    font-size: 0.9rem;
    margin-bottom: 2.5rem;
  }
  .select-container {
    display: flex;
    gap: 3rem;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }
  .player-panel {
    background: var(--hud-bg);
    border: 2px solid var(--panel-border);
    border-radius: 8px;
    padding: 1.5rem;
    min-width: 220px;
    text-align: center;
  }
  .player-panel h3 {
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    margin-bottom: 1rem;
  }
  .p1-label { color: var(--neon-green); }
  .p2-label { color: var(--neon-red); }

  .tank-option {
    cursor: pointer;
    border: 2px solid #333;
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    margin-bottom: 0.5rem;
    transition: all 0.2s;
    text-align: left;
    background: rgba(255,255,255,0.03);
  }
  .tank-option:hover { border-color: var(--tan); background: rgba(200,168,107,0.1); }
  .tank-option.selected-p1 { border-color: var(--neon-green); background: rgba(57,255,20,0.1); }
  .tank-option.selected-p2 { border-color: var(--neon-red); background: rgba(255,32,32,0.1); }
  .tank-name { font-size: 0.75rem; color: var(--tan); font-weight: 700; }
  .tank-nation { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: #888; margin-top: 2px; }
  .tank-stats { display: flex; gap: 0.8rem; margin-top: 4px; }
  .stat { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; color: #aaa; }
  .stat span { color: #ddd; }

  .controls-hint {
    background: var(--hud-bg);
    border: 1px solid #333;
    border-radius: 6px;
    padding: 1rem 1.5rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: #888;
    line-height: 1.8;
    text-align: center;
  }
  .controls-hint b { color: var(--tan); }

  #btn-start {
    margin-top: 2rem;
    background: linear-gradient(135deg, #3d4a1e, #5a6e2a);
    border: 2px solid var(--tan);
    color: var(--tan);
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 0.8rem 3rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  #btn-start:hover {
    background: linear-gradient(135deg, #5a6e2a, #7a9a3a);
    box-shadow: 0 0 20px #c8a86b44;
    transform: scale(1.03);
  }

  /* ===== GAME SCREEN ===== */
  #screen-game { background: transparent; flex-direction: column; }

  /* HUD */
  #hud {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: var(--hud-bg);
    border-bottom: 2px solid var(--panel-border);
    z-index: 10;
    flex-shrink: 0;
  }
  .hud-player {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 220px;
  }
  .hud-name {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    font-weight: 700;
  }
  .p1-color { color: var(--neon-green); }
  .p2-color { color: var(--neon-red); }
  .hud-tank-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: #aaa;
  }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; color: #888; width: 20px; }
  .bar-bg {
    height: 8px;
    background: #222;
    border-radius: 4px;
    width: 140px;
    border: 1px solid #444;
    overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.2s; }
  .hp-fill { background: linear-gradient(90deg, #2ecc71, #27ae60); }
  .hp-fill.low { background: linear-gradient(90deg, #e74c3c, #c0392b); }
  .ammo-fill { background: linear-gradient(90deg, #f39c12, #e67e22); }
  .bar-val { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; color: #ccc; min-width: 28px; }
  .cooldown-text { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; color: #f39c12; }

  .hud-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .hud-timer {
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--tan);
    letter-spacing: 0.1em;
  }
  .hud-score {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: #888;
    letter-spacing: 0.1em;
  }
  .kill-feed {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: #ffd700;
    text-align: center;
    pointer-events: none;
    z-index: 20;
    text-shadow: 0 0 8px #ffd700;
  }

  /* CANVAS */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #gameCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* MINIMAP */
  #minimap {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 120px;
    height: 90px;
    border: 2px solid var(--panel-border);
    background: rgba(0,0,0,0.6);
    border-radius: 4px;
  }

  /* GAME OVER */
  #screen-over {
    background: rgba(0,0,0,0.9);
    z-index: 100;
  }
  .over-title {
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    margin-bottom: 0.5rem;
  }
  .over-winner { font-size: 1.2rem; color: var(--tan); margin-bottom: 0.3rem; }
  .over-stats { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: #888; margin-bottom: 2rem; }
  #btn-restart, #btn-menu {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 0.7rem 2rem;
    border-radius: 6px;
    cursor: pointer;
    margin: 0.3rem;
    transition: all 0.2s;
  }
  #btn-restart { background: #3d4a1e; border: 2px solid var(--tan); color: var(--tan); }
  #btn-restart:hover { background: #5a6e2a; }
  #btn-menu { background: #1a1a1a; border: 2px solid #555; color: #888; }
  #btn-menu:hover { border-color: #888; color: #ccc; }

  /* Explosion particle */
  .explosion-overlay {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    animation: explode 0.5s forwards;
  }
  @keyframes explode {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(4); opacity: 0; }
  }
</style>
</head>
<body>

<!-- SELECT SCREEN -->
<div id="screen-select">
  <div class="game-title">⚔ TANK WARFARE ⚔</div>
  <div class="game-subtitle">SELECT YOUR ARMORED VEHICLE</div>

  <div class="select-container">
    <!-- Player 1 -->
    <div class="player-panel">
      <h3 class="p1-label">▶ PLAYER 1 (Green)</h3>
      <div id="p1-tanks"></div>
    </div>

    <!-- Controls -->
    <div class="controls-hint">
      <b>PLAYER 1</b><br>
      W A S D — เคลื่อนที่<br>
      <b>SPACE</b> — ยิง<br><br>
      <b>PLAYER 2</b><br>
      ↑ ↓ ← → — เคลื่อนที่<br>
      <b>ENTER</b> — ยิง<br><br>
      <b>P</b> — หยุด/เล่นต่อ
    </div>

    <!-- Player 2 -->
    <div class="player-panel">
      <h3 class="p2-label">▶ PLAYER 2 (Red)</h3>
      <div id="p2-tanks"></div>
    </div>
  </div>

  <button id="btn-start">🎮 START BATTLE</button>
</div>

<!-- GAME SCREEN -->
<div id="screen-game hidden" class="hidden">
  <div id="hud">
    <!-- P1 -->
    <div class="hud-player">
      <div class="hud-name p1-color">◀ PLAYER 1</div>
      <div class="hud-tank-name p1-color" id="hud-p1-tank">—</div>
      <div class="bar-row">
        <div class="bar-label">HP</div>
        <div class="bar-bg"><div class="bar-fill hp-fill" id="hp-bar-1" style="width:100%"></div></div>
        <div class="bar-val" id="hp-val-1">100</div>
      </div>
      <div class="bar-row">
        <div class="bar-label">AMO</div>
        <div class="bar-bg"><div class="bar-fill ammo-fill" id="ammo-bar-1" style="width:100%"></div></div>
        <div class="bar-val" id="ammo-val-1">30</div>
      </div>
      <div class="cooldown-text" id="cd-1"></div>
    </div>

    <!-- CENTER -->
    <div class="hud-center">
      <div class="hud-timer" id="hud-timer">03:00</div>
      <div class="hud-score" id="hud-score">P1: 0 — P2: 0</div>
    </div>

    <!-- P2 -->
    <div class="hud-player" style="text-align:right">
      <div class="hud-name p2-color">PLAYER 2 ▶</div>
      <div class="hud-tank-name p2-color" id="hud-p2-tank">—</div>
      <div class="bar-row" style="flex-direction:row-reverse">
        <div class="bar-label">HP</div>
        <div class="bar-bg"><div class="bar-fill hp-fill" id="hp-bar-2" style="width:100%"></div></div>
        <div class="bar-val" id="hp-val-2">100</div>
      </div>
      <div class="bar-row" style="flex-direction:row-reverse">
        <div class="bar-label">AMO</div>
        <div class="bar-bg"><div class="bar-fill ammo-fill" id="ammo-bar-2" style="width:100%"></div></div>
        <div class="bar-val" id="ammo-val-2">30</div>
      </div>
      <div class="cooldown-text" style="text-align:right" id="cd-2"></div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <canvas id="minimap"></canvas>
    <div class="kill-feed" id="kill-feed"></div>
  </div>
</div>

<!-- GAME OVER -->
<div id="screen-over" class="hidden">
  <div class="over-title" id="over-title">VICTORY</div>
  <div class="over-winner" id="over-winner"></div>
  <div class="over-stats" id="over-stats"></div>
  <div>
    <button id="btn-restart">🔄 REMATCH</button>
    <button id="btn-menu">🏠 MENU</button>
  </div>
</div>

<script>
// ===================== TANK DATA =====================
const TANKS = [
  { id:'t90', name:'T-90A', nation:'🇷🇺 Russia', hp:120, speed:2.2, fireRate:1400, damage:28, armor:18, color:'#4a7a4a', barrelColor:'#2a4a2a', ammo:25, desc:'Rugged & armored' },
  { id:'m1a2', name:'M1A2 Abrams', nation:'🇺🇸 USA', hp:110, speed:2.5, fireRate:1200, damage:30, armor:15, color:'#6b7c3a', barrelColor:'#4a5a2a', ammo:30, desc:'Fast & accurate' },
  { id:'fv4005', name:'FV4005', nation:'🇬🇧 UK', hp:80, speed:2.0, fireRate:2200, damage:70, armor:8, color:'#5a5a3a', barrelColor:'#3a3a2a', ammo:12, desc:'One-shot killer' },
  { id:'leopard', name:'Leopard 2A7', nation:'🇩🇪 Germany', hp:105, speed:2.6, fireRate:1100, damage:32, armor:14, color:'#6a6a4a', barrelColor:'#4a4a2a', ammo:28, desc:'Balanced precision' },
  { id:'k2', name:'K2 Black Panther', nation:'🇰🇷 Korea', hp:100, speed:2.8, fireRate:1050, damage:31, armor:13, color:'#4a5a6a', barrelColor:'#2a3a4a', ammo:30, desc:'High-tech speed' },
  { id:'challenger', name:'Challenger 2', nation:'🇬🇧 UK', hp:130, speed:1.8, fireRate:1500, damage:26, armor:22, color:'#5a4a3a', barrelColor:'#3a2a1a', ammo:22, desc:'Fortress on tracks' },
];

let p1Choice = 0, p2Choice = 1;

// Build tank selection
function buildTankSelect() {
  ['p1','p2'].forEach((p, pi) => {
    const cont = document.getElementById(`${p}-tanks`);
    TANKS.forEach((t, i) => {
      const div = document.createElement('div');
      div.className = 'tank-option' + (i === (pi===0?p1Choice:p2Choice) ? ` selected-${p}` : '');
      div.innerHTML = `
        <div class="tank-name">${t.name}</div>
        <div class="tank-nation">${t.nation} · ${t.desc}</div>
        <div class="tank-stats">
          <div class="stat">HP <span>${t.hp}</span></div>
          <div class="stat">SPD <span>${t.speed}</span></div>
          <div class="stat">DMG <span>${t.damage}</span></div>
          <div class="stat">ARM <span>${t.armor}</span></div>
        </div>`;
      div.addEventListener('click', () => {
        if(pi===0) p1Choice=i; else p2Choice=i;
        buildTankSelect();
      });
      cont.appendChild(div);
    });
  });
}
buildTankSelect();

// ===================== GAME ENGINE =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const miniCanvas = document.getElementById('minimap');
const mctx = miniCanvas.getContext('2d');

let W, H;
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width = wrap.clientWidth;
  H = canvas.height = wrap.clientHeight;
}

// Map tiles
const TILE = 40;
let mapCols, mapRows, mapData=[], trees=[], craters=[];
const MAP_W = 60, MAP_H = 45;

function genMap() {
  mapData = [];
  trees = [];
  craters = [];
  // 0=grass,1=dirt,2=bush,3=water,4=rock,5=sand
  for(let r=0;r<MAP_H;r++){
    mapData[r]=[];
    for(let c=0;c<MAP_W;c++){
      const n=Math.random();
      if(n<0.04) mapData[r][c]=3; // water
      else if(n<0.1) mapData[r][c]=4; // rock
      else if(n<0.2) mapData[r][c]=5; // sand
      else if(n<0.3) mapData[r][c]=1; // dirt
      else mapData[r][c]=0; // grass
    }
  }
  // border water
  for(let c=0;c<MAP_W;c++){mapData[0][c]=3;mapData[MAP_H-1][c]=3;}
  for(let r=0;r<MAP_H;r++){mapData[r][0]=3;mapData[r][MAP_W-1]=3;}

  // trees
  for(let i=0;i<60;i++){
    const c=2+Math.floor(Math.random()*(MAP_W-4));
    const r=2+Math.floor(Math.random()*(MAP_H-4));
    if(mapData[r][c]===0||mapData[r][c]===1) trees.push({x:c*TILE+TILE/2,y:r*TILE+TILE/2,r:10+Math.random()*8});
  }
}

// Camera
let cam={x:0,y:0};
function updateCamera(t1,t2){
  const mx=(t1.x+t2.x)/2, my=(t1.y+t2.y)/2;
  cam.x=Math.max(0,Math.min(MAP_W*TILE-W, mx-W/2));
  cam.y=Math.max(0,Math.min(MAP_H*TILE-H, my-H/2));
}

// Tank state
function makeTank(tid, x, y, angle, controls, color, player) {
  const data = TANKS[tid];
  return {
    ...data,
    maxHp: data.hp,
    maxAmmo: data.ammo,
    currentAmmo: data.ammo,
    reloading: false,
    reloadTimer: 0,
    x, y, angle, turretAngle: angle,
    vx:0, vy:0,
    controls,
    color,
    player,
    lastFire: 0,
    cooldownLeft: 0,
    score: 0,
    alive: true,
    trail: [],
  };
}

let tank1, tank2, bullets=[], explosions=[], gameState, timer, paused;
const BULLET_SPEED = 7;
const RELOAD_TIME = 5000;

function initGame() {
  genMap();
  const cx=MAP_W*TILE/2, cy=MAP_H*TILE/2;
  tank1 = makeTank(p1Choice, cx-200, cy, 0, {up:'w',down:'s',left:'a',right:'d',fire:' '}, '#39ff14', 1);
  tank2 = makeTank(p2Choice, cx+200, cy, Math.PI, {up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight',fire:'Enter'}, '#ff2020', 2);
  bullets=[];explosions=[];
  timer=180; paused=false; gameState='playing';
  document.getElementById('hud-p1-tank').textContent = TANKS[p1Choice].name;
  document.getElementById('hud-p2-tank').textContent = TANKS[p2Choice].name;
  updateHUD();
}

// Keys
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' '||e.key==='ArrowUp'||e.key==='ArrowDown') e.preventDefault();
  if(e.key==='p'||e.key==='P'){paused=!paused;}
});
document.addEventListener('keyup',e=>keys[e.key]=false);

function canMove(x,y,r=14){
  const corners=[[x-r,y-r],[x+r,y-r],[x-r,y+r],[x+r,y+r],[x,y-r],[x,y+r],[x-r,y],[x+r,y]];
  for(const [cx2,cy2] of corners){
    const col=Math.floor(cx2/TILE),row=Math.floor(cy2/TILE);
    if(row<0||row>=MAP_H||col<0||col>=MAP_W) return false;
    const t=mapData[row][col];
    if(t===3||t===4) return false;
  }
  // vs trees
  for(const tr of trees){
    const dx=x-tr.x,dy=y-tr.y;
    if(Math.sqrt(dx*dx+dy*dy)<r+tr.r-4) return false;
  }
  return true;
}

function moveTank(tank, dt) {
  if(!tank.alive) return;
  const c=tank.controls;
  let moving=false, turning=false;
  const spd = tank.speed * (mapData[Math.floor(tank.y/TILE)]?.[Math.floor(tank.x/TILE)]===5?0.7:1);

  if(keys[c.left]) { tank.angle-=0.04; turning=true; }
  if(keys[c.right]) { tank.angle+=0.04; turning=true; }

  let nx=tank.x,ny=tank.y;
  if(keys[c.up]){
    nx+=Math.cos(tank.angle)*spd;
    ny+=Math.sin(tank.angle)*spd;
    moving=true;
  }
  if(keys[c.down]){
    nx-=Math.cos(tank.angle)*spd*0.6;
    ny-=Math.sin(tank.angle)*spd*0.6;
    moving=true;
  }
  if(canMove(nx,tank.y)) tank.x=nx;
  if(canMove(tank.x,ny)) tank.y=ny;

  // trail
  if(moving&&Math.random()<0.3) tank.trail.push({x:tank.x,y:tank.y,life:30});
  tank.trail=tank.trail.filter(t=>{t.life--;return t.life>0;});

  // fire
  if(keys[c.fire]&&gameState==='playing') fireBullet(tank);

  // cooldown display
  const cd=tank.cooldownLeft;
  document.getElementById(`cd-${tank.player}`).textContent = cd>0?`⟳ ${(cd/1000).toFixed(1)}s`:'';

  // reload
  if(tank.reloading){
    tank.reloadTimer-=dt;
    if(tank.reloadTimer<=0){tank.reloading=false;tank.currentAmmo=tank.maxAmmo;}
  }
}

function fireBullet(tank){
  const now=Date.now();
  if(now-tank.lastFire < tank.fireRate) return;
  if(tank.currentAmmo<=0){
    if(!tank.reloading){tank.reloading=true;tank.reloadTimer=RELOAD_TIME;}
    return;
  }
  tank.lastFire=now;
  tank.cooldownLeft=tank.fireRate;
  tank.currentAmmo--;
  const bx=tank.x+Math.cos(tank.angle)*22;
  const by=tank.y+Math.sin(tank.angle)*22;
  bullets.push({x:bx,y:by,vx:Math.cos(tank.angle)*BULLET_SPEED,vy:Math.sin(tank.angle)*BULLET_SPEED,owner:tank.player,damage:tank.damage,life:120,r:4});
  playSound('fire');
}

function updateBullets(){
  bullets=bullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;b.life--;
    // wall
    const col=Math.floor(b.x/TILE),row=Math.floor(b.y/TILE);
    if(row<0||row>=MAP_H||col<0||col>=MAP_W){addExplosion(b.x,b.y,15,'#ff8800');return false;}
    const t=mapData[row][col];
    if(t===3||t===4){addExplosion(b.x,b.y,15,'#ff8800');return false;}
    // vs trees
    for(const tr of trees){
      if(Math.hypot(b.x-tr.x,b.y-tr.y)<tr.r+b.r){addExplosion(b.x,b.y,10,'#cc6600');return false;}
    }
    // vs tanks
    for(const tank of [tank1,tank2]){
      if(!tank.alive||tank.player===b.owner) continue;
      if(Math.hypot(b.x-tank.x,b.y-tank.y)<18){
        const dmg=Math.max(1,b.damage-tank.armor/2);
        tank.hp-=dmg;
        addExplosion(b.x,b.y,30,'#ff4400');
        playSound('hit');
        if(tank.hp<=0){tank.alive=false;handleDeath(tank);}
        return false;
      }
    }
    return b.life>0;
  });
}

function handleDeath(tank){
  const winner=tank.player===1?tank2:tank1;
  winner.score++;
  addExplosion(tank.x,tank.y,80,'#ff2200');
  addExplosion(tank.x+20,tank.y-10,50,'#ff6600');
  addExplosion(tank.x-15,tank.y+15,40,'#ffaa00');
  showKillFeed(`💥 P${winner.player} DESTROYED P${tank.player}!`);
  playSound('explode');
  craters.push({x:tank.x,y:tank.y,r:25});
  setTimeout(()=>endRound(),1500);
}

function endRound(){
  if(!tank1.alive||!tank2.alive){
    endGame(); return;
  }
}

function endGame(){
  gameState='over';
  let title,winner,col;
  if(!tank1.alive&&!tank2.alive){title='DRAW';winner='Both tanks destroyed!';col='#ffd700';}
  else if(!tank2.alive){title='PLAYER 1 WINS';winner=`${TANKS[p1Choice].name} victorious!`;col='#39ff14';}
  else{title='PLAYER 2 WINS';winner=`${TANKS[p2Choice].name} victorious!`;col='#ff2020';}
  document.getElementById('over-title').textContent=title;
  document.getElementById('over-title').style.color=col;
  document.getElementById('over-winner').textContent=winner;
  document.getElementById('over-stats').textContent=`P1 Score: ${tank1.score}   P2 Score: ${tank2.score}`;
  document.getElementById('screen-over').classList.remove('hidden');
}

function addExplosion(x,y,r,color){
  explosions.push({x,y,r,maxR:r,life:30,maxLife:30,color});
}

function updateExplosions(){
  explosions=explosions.filter(e=>{
    e.life--;
    return e.life>0;
  });
}

// Timer
let lastTimerTick=0;
function updateTimer(now){
  if(!paused&&gameState==='playing'){
    tank1.cooldownLeft=Math.max(0,tank1.cooldownLeft-(now-lastTimerTick));
    tank2.cooldownLeft=Math.max(0,tank2.cooldownLeft-(now-lastTimerTick));
  }
  if(now-lastTimerTick>=1000&&!paused&&gameState==='playing'){
    lastTimerTick=now;
    timer--;
    if(timer<=0){
      // time up - whoever has more hp wins
      if(tank1.hp>tank2.hp){tank2.alive=false;tank2.hp=0;}
      else if(tank2.hp>tank1.hp){tank1.alive=false;tank1.hp=0;}
      else{tank1.alive=false;tank2.alive=false;}
      endGame();
    }
  }
  const m=Math.floor(timer/60),s=timer%60;
  document.getElementById('hud-timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('hud-timer').style.color=timer<30?'#ff4444':'#c8a86b';
}

function updateHUD(){
  [tank1,tank2].forEach(t=>{
    const p=t.player;
    const hpPct=Math.max(0,t.hp/t.maxHp*100);
    const ampPct=t.currentAmmo/t.maxAmmo*100;
    document.getElementById(`hp-bar-${p}`).style.width=hpPct+'%';
    document.getElementById(`hp-bar-${p}`).className='bar-fill hp-fill'+(hpPct<30?' low':'');
    document.getElementById(`hp-val-${p}`).textContent=Math.max(0,Math.round(t.hp));
    document.getElementById(`ammo-bar-${p}`).style.width=ampPct+'%';
    document.getElementById(`ammo-val-${p}`).textContent=t.reloading?'⟳':t.currentAmmo;
  });
  document.getElementById('hud-score').textContent=`P1: ${tank1.score} — P2: ${tank2.score}`;
}

// ===================== DRAW =====================
const TILE_COLORS={0:'#4a7a2a',1:'#8a6a3a',2:'#3a6a1a',3:'#1a4a7a',4:'#5a5a5a',5:'#b8a060'};

function drawMap(){
  const c0=Math.max(0,Math.floor(cam.x/TILE));
  const c1=Math.min(MAP_W,Math.ceil((cam.x+W)/TILE));
  const r0=Math.max(0,Math.floor(cam.y/TILE));
  const r1=Math.min(MAP_H,Math.ceil((cam.y+H)/TILE));
  for(let r=r0;r<r1;r++){
    for(let c=c0;c<c1;c++){
      const t=mapData[r][c];
      ctx.fillStyle=TILE_COLORS[t]||'#4a7a2a';
      ctx.fillRect(c*TILE-cam.x,r*TILE-cam.y,TILE,TILE);
      // grass pattern
      if(t===0&&(r+c)%3===0){ctx.fillStyle='rgba(0,0,0,0.06)';ctx.fillRect(c*TILE-cam.x+2,r*TILE-cam.y+2,TILE-4,TILE-4);}
      if(t===3){// water shimmer
        ctx.fillStyle='rgba(100,180,255,0.2)';
        ctx.fillRect(c*TILE-cam.x,r*TILE-cam.y,TILE,TILE);
      }
    }
  }
  // craters
  for(const cr of craters){
    const sx=cr.x-cam.x,sy=cr.y-cam.y;
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,cr.r);
    g.addColorStop(0,'#1a1000');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,cr.r,0,Math.PI*2);ctx.fill();
  }
  // trees
  for(const tr of trees){
    const sx=tr.x-cam.x,sy=tr.y-cam.y;
    if(sx<-30||sx>W+30||sy<-30||sy>H+30) continue;
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(sx+4,sy+4,tr.r,tr.r*0.6,0,0,Math.PI*2);ctx.fill();
    // tree
    ctx.fillStyle='#2a5a0a';ctx.beginPath();ctx.arc(sx,sy,tr.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3a7a1a';ctx.beginPath();ctx.arc(sx-2,sy-2,tr.r*0.7,0,Math.PI*2);ctx.fill();
  }
}

function drawTank(tank){
  if(!tank.alive) return;
  const sx=tank.x-cam.x, sy=tank.y-cam.y;
  ctx.save();
  ctx.translate(sx,sy);

  // trail
  for(const t of tank.trail){
    ctx.fillStyle=`rgba(100,80,40,${t.life/30*0.4})`;
    ctx.beginPath();ctx.arc(t.x-cam.x-sx+sx,t.y-cam.y-sy+sy,4,0,Math.PI*2);ctx.fill();
  }

  ctx.rotate(tank.angle);
  // body shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(-17,16-3,34,14);

  // tracks
  ctx.fillStyle='#222';
  ctx.fillRect(-18,-14,36,8);
  ctx.fillRect(-18,6,36,8);
  // track details
  ctx.fillStyle='#333';
  for(let i=-16;i<18;i+=6){
    ctx.fillRect(i,-14,4,8);ctx.fillRect(i,6,4,8);
  }
  // body
  ctx.fillStyle=tank.color;
  ctx.fillRect(-14,-10,28,20);
  // hull highlight
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(-14,-10,28,8);
  // turret
  ctx.fillStyle=tank.id==='challenger'?'#6a5a4a':tank.color;
  ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();
  // barrel
  ctx.fillStyle=tank.barrelColor||'#2a3a1a';
  const bLen = tank.id==='fv4005'?32:tank.id==='challenger'?28:24;
  ctx.fillRect(0,-3,bLen,6);
  // hatches
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
  // antenna
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-10,-5);ctx.lineTo(-12,-18);ctx.stroke();

  ctx.restore();

  // health ring
  ctx.save();
  ctx.translate(sx,sy);
  const hpFrac=tank.hp/tank.maxHp;
  ctx.strokeStyle=hpFrac>0.5?'#2ecc71':hpFrac>0.25?'#f39c12':'#e74c3c';
  ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2*hpFrac);ctx.stroke();

  // player label
  ctx.fillStyle=tank.player===1?'#39ff14':'#ff2020';
  ctx.font='bold 9px Orbitron';ctx.textAlign='center';
  ctx.fillText(`P${tank.player}`,-0,-24);
  ctx.restore();
}

function drawBullets(){
  for(const b of bullets){
    const sx=b.x-cam.x,sy=b.y-cam.y;
    ctx.save();
    // glow
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,8);
    g.addColorStop(0,'rgba(255,200,50,0.9)');g.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

function drawExplosions(){
  for(const e of explosions){
    const sx=e.x-cam.x,sy=e.y-cam.y;
    const f=e.life/e.maxLife;
    const r=e.r*(1-f*0.5);
    ctx.save();
    ctx.globalAlpha=f;
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,r);
    g.addColorStop(0,'#ffffff');
    g.addColorStop(0.3,'#ffdd00');
    g.addColorStop(0.7,e.color);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();
    // sparks
    for(let i=0;i<6;i++){
      const a=i/6*Math.PI*2;const d=r*0.8;
      ctx.strokeStyle='#ffaa00';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+Math.cos(a)*d,sy+Math.sin(a)*d);ctx.stroke();
    }
    ctx.restore();
  }
}

function drawMinimap(){
  const mW=120,mH=90;
  mctx.clearRect(0,0,mW,mH);
  mctx.fillStyle='rgba(0,0,0,0.7)';mctx.fillRect(0,0,mW,mH);
  const scX=mW/(MAP_W*TILE),scY=mH/(MAP_H*TILE);
  // tiles simplified
  for(let r=0;r<MAP_H;r++){
    for(let c=0;c<MAP_W;c++){
      const t=mapData[r][c];
      mctx.fillStyle=TILE_COLORS[t]||'#4a7a2a';
      mctx.fillRect(c*TILE*scX,r*TILE*scY,TILE*scX+1,TILE*scY+1);
    }
  }
  // tanks
  if(tank1.alive){mctx.fillStyle='#39ff14';mctx.beginPath();mctx.arc(tank1.x*scX,tank1.y*scY,4,0,Math.PI*2);mctx.fill();}
  if(tank2.alive){mctx.fillStyle='#ff2020';mctx.beginPath();mctx.arc(tank2.x*scX,tank2.y*scY,4,0,Math.PI*2);mctx.fill();}
  // viewport
  mctx.strokeStyle='rgba(255,255,255,0.4)';mctx.lineWidth=1;
  mctx.strokeRect(cam.x*scX,cam.y*scY,W*scX,H*scY);
}

function drawPause(){
  if(!paused) return;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#c8a86b';ctx.font='bold 48px Orbitron';ctx.textAlign='center';
  ctx.fillText('⏸ PAUSED',W/2,H/2);
  ctx.font='18px Share Tech Mono';ctx.fillStyle='#888';
  ctx.fillText('Press P to continue',W/2,H/2+40);
}

// ===================== SOUND (Web Audio) =====================
let audioCtx;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playSound(type){
  try{
    const ac=getAudio();
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    osc.connect(gain);gain.connect(ac.destination);
    if(type==='fire'){osc.type='sawtooth';osc.frequency.setValueAtTime(200,ac.currentTime);osc.frequency.exponentialRampToValueAtTime(80,ac.currentTime+0.1);gain.gain.setValueAtTime(0.2,ac.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);}
    else if(type==='hit'){osc.type='square';osc.frequency.setValueAtTime(150,ac.currentTime);osc.frequency.exponentialRampToValueAtTime(50,ac.currentTime+0.2);gain.gain.setValueAtTime(0.3,ac.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.25);}
    else if(type==='explode'){osc.type='sawtooth';osc.frequency.setValueAtTime(100,ac.currentTime);osc.frequency.exponentialRampToValueAtTime(20,ac.currentTime+0.5);gain.gain.setValueAtTime(0.4,ac.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.6);}
    osc.start();osc.stop(ac.currentTime+0.6);
  }catch(e){}
}

// Kill feed
let killFeedTimeout;
function showKillFeed(msg){
  const kf=document.getElementById('kill-feed');
  kf.textContent=msg;kf.style.opacity='1';
  clearTimeout(killFeedTimeout);
  killFeedTimeout=setTimeout(()=>{kf.style.opacity='0';},2500);
}

// ===================== MAIN LOOP =====================
let lastTime=0;
function loop(now){
  const dt=now-lastTime;lastTime=now;
  if(gameState==='playing'&&!paused){
    moveTank(tank1,dt);
    moveTank(tank2,dt);
    updateBullets();
    updateExplosions();
    updateCamera(tank1,tank2);
    updateHUD();
  }
  updateTimer(now);

  ctx.clearRect(0,0,W,H);
  drawMap();
  drawBullets();
  drawExplosions();
  drawTank(tank1);drawTank(tank2);
  drawMinimap();
  drawPause();

  requestAnimationFrame(loop);
}

// Buttons
document.getElementById('btn-start').addEventListener('click',()=>{
  document.getElementById('screen-select').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');
  resize();
  initGame();
  lastTime=performance.now();
  lastTimerTick=lastTime;
  requestAnimationFrame(loop);
});

document.getElementById('btn-restart').addEventListener('click',()=>{
  document.getElementById('screen-over').classList.add('hidden');
  initGame();
  lastTimerTick=performance.now();
});

document.getElementById('btn-menu').addEventListener('click',()=>{
  document.getElementById('screen-over').classList.add('hidden');
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-select').classList.remove('hidden');
  gameState='menu';
});

window.addEventListener('resize',resize);
miniCanvas.style.cssText='position:absolute;bottom:10px;right:10px;width:120px;height:90px;border:2px solid #5a6e2a;background:rgba(0,0,0,0.6);border-radius:4px;';
miniCanvas.width=120;miniCanvas.height=90;
</script>
